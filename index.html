
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- <meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <title>Fo-Fi - CRM</title>
    <meta name="description" content="Fo-Fi CRM" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Fo-Fi CRM" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <link rel="apple-touch-icon" href="/icons/apple-icon-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/favicon.png" />
    <!-- Minimal set of iOS splash sizes as placeholders -->
    <!-- <link rel="apple-touch-startup-image" href="/icons/apple-splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"> -->
    <link rel="apple-touch-startup-image" href="/icons/splash-1179x2556.png"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/icons/splash-1170x2532.png"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="/icons/splash-750x1334.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
    <link rel="apple-touch-startup-image" href="/icons/splash-828x1792.png"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)">
    <!-- manifest injected by vite-plugin-pwa at build time -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-render-blocking font: preload → swap to stylesheet after load -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>

    <!-- Pre-establish connection to IPTV API server -->
    <link rel="preconnect" href="https://bbnlnetmon.bbnl.in" crossorigin />
    <link rel="dns-prefetch" href="https://bbnlnetmon.bbnl.in" />
    <!-- Pre-establish connection to channel logo CDN (nginx) — saves 300-500ms
         on Android Chrome (DNS + TCP + TLS) before the first logo fetch -->
    <link rel="preconnect" href="https://cdn1.bbnl.in" crossorigin />
    <link rel="dns-prefetch" href="https://cdn1.bbnl.in" />
    <!-- Pre-establish connections to stream servers for faster first segment load -->
    <link rel="preconnect" href="https://livestream.bbnl.in" crossorigin />
    <link rel="preconnect" href="https://livestream2.bbnl.in" crossorigin />
    <link rel="dns-prefetch" href="https://livestream.bbnl.in" />
    <link rel="dns-prefetch" href="https://livestream2.bbnl.in" />
    <link rel="preconnect" href="https://api.ipify.org" crossorigin />
    <link rel="dns-prefetch" href="https://api.ipify.org" />

  </head>
  <body class="bg-gray-50 dark:bg-gray-900">
    <div id="root">
      <!-- Inline loading indicator — visible until React mounts and replaces this.
           If JS fails to load (stale cache, network error, chunk 404), the user
           sees this instead of a blank white page. -->
      <div id="boot-loader" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;background:#f9fafb;color:#6b7280;padding:1rem;text-align:center">
        <div style="width:2rem;height:2rem;border:3px solid #e0e7ff;border-top-color:#4f46e5;border-radius:50%;animation:bspin .7s linear infinite;margin-bottom:.75rem"></div>
        <p style="font-size:.875rem;margin:0">Loading Fo-Fi CRM…</p>
        <style>@keyframes bspin{to{transform:rotate(360deg)}}@media(prefers-color-scheme:dark){#boot-loader{background:#111827!important;color:#9ca3af!important}}</style>
      </div>
    </div>

    <!-- Global error handler — catches module-level crashes BEFORE React mounts.
         Without this, any import error = permanent blank white page. -->
    <script>
      (function(){
        var shown = false;
        function showBootError(msg) {
          if (shown) return;
          shown = true;
          var el = document.getElementById('boot-loader');
          if (!el) el = document.getElementById('root');
          el.innerHTML =
            '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;padding:1.5rem;text-align:center">' +
              '<div style="width:3rem;height:3rem;margin-bottom:.75rem;border-radius:50%;background:#fee2e2;display:flex;align-items:center;justify-content:center">' +
                '<svg width="24" height="24" fill="none" stroke="#ef4444" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>' +
              '</div>' +
              '<p style="font-size:.9375rem;font-weight:600;color:#1f2937;margin:0 0 .25rem">App failed to load</p>' +
              '<p style="font-size:.8125rem;color:#6b7280;margin:0 0 1rem;max-width:20rem;word-break:break-word">' + (msg || 'An unexpected error occurred.') + '</p>' +
              '<button onclick="clearAndReload()" style="padding:.625rem 1.25rem;background:#4f46e5;color:#fff;border:none;border-radius:.5rem;font-size:.875rem;font-weight:500;cursor:pointer">Reload App</button>' +
            '</div>';
        }

        // Clear caches and reload — nuclear recovery for stale SW / broken chunks
        window.clearAndReload = function() {
          Promise.all([
            ('caches' in window) ? caches.keys().then(function(n){return Promise.allSettled(n.map(function(k){return caches.delete(k)}))}) : Promise.resolve(),
            ('serviceWorker' in navigator) ? navigator.serviceWorker.getRegistrations().then(function(r){return Promise.allSettled(r.map(function(x){return x.unregister()}))}) : Promise.resolve()
          ]).finally(function(){ location.reload(); });
        };

        // Catch synchronous errors (module parse failures, import crashes)
        window.onerror = function(msg) { showBootError(msg); };
        // Catch async errors (dynamic import failures, unhandled rejections)
        window.addEventListener('unhandledrejection', function(e) {
          showBootError(e.reason && e.reason.message ? e.reason.message : 'Failed to load application module.');
        });

        // Timeout fallback — if React hasn't mounted after 15s, something is wrong.
        // React removes #boot-loader when it mounts, so if it's still there = stuck.
        setTimeout(function() {
          if (document.getElementById('boot-loader')) {
            showBootError('App took too long to load. This may be a network or cache issue.');
          }
        }, 15000);
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

# ═══════════════════════════════════════════════════════════════════════════════
# BBNL CRM PWA - nginx HTTP/2 Configuration
# ═══════════════════════════════════════════════════════════════════════════════
# Purpose: Serve PWA with HTTP/2 support + proxy Node.js server
# Version: 2.0
# Date: February 2026
# Author: BBNL Development Team
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# Upstream Backend (Node.js server.js)
# ───────────────────────────────────────────────────────────────────────────────
upstream nodejs_backend {
    # Node.js server running on localhost:3000
    server 127.0.0.1:3000;
    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# ───────────────────────────────────────────────────────────────────────────────
# HTTP to HTTPS Redirect (Port 80)
# ───────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name bbnlnetmon.bbnl.in;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# ───────────────────────────────────────────────────────────────────────────────
# Main HTTPS Server with HTTP/2
# ───────────────────────────────────────────────────────────────────────────────
server {
    # ═══════════════════════════════════════════════════════════════════════════
    # CRITICAL: HTTP/2 Configuration
    # ═══════════════════════════════════════════════════════════════════════════
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bbnlnetmon.bbnl.in;

    # ═══════════════════════════════════════════════════════════════════════════
    # SSL/TLS Configuration (Required for HTTP/2)
    # ═══════════════════════════════════════════════════════════════════════════
    ssl_certificate /etc/ssl/certs/bbnl.crt;
    ssl_certificate_key /etc/ssl/private/bbnl.key;
    
    # SSL Protocols (TLS 1.2+ required for HTTP/2)
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # Strong ciphers for HTTP/2
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    
    # SSL Session Management
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ═══════════════════════════════════════════════════════════════════════════
    # HTTP/2 Specific Settings
    # ═══════════════════════════════════════════════════════════════════════════
    http2_push_preload on;
    http2_max_field_size 16k;
    http2_max_header_size 32k;
    http2_max_requests 1000;
    
    # ═══════════════════════════════════════════════════════════════════════════
    # Security Headers
    # ═══════════════════════════════════════════════════════════════════════════
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # ═══════════════════════════════════════════════════════════════════════════
    # Logging
    # ═══════════════════════════════════════════════════════════════════════════
    access_log /var/log/nginx/bbnl-crm-access.log combined;
    error_log /var/log/nginx/bbnl-crm-error.log warn;
    
    # Log HTTP/2 requests (for debugging)
    log_format http2_combined '$remote_addr - $remote_user [$time_local] '
                              '"$request" $status $body_bytes_sent '
                              '"$http_referer" "$http_user_agent" '
                              'proto=$server_protocol';
    
    # ═══════════════════════════════════════════════════════════════════════════
    # Root Configuration
    # ═══════════════════════════════════════════════════════════════════════════
    root /var/www/html;
    index index.html;

    # ═══════════════════════════════════════════════════════════════════════════
    # SECTION 1: Proxy ALL /smartphone/crm requests to Node.js server
    # ═══════════════════════════════════════════════════════════════════════════
    # This ensures the Node.js HTTP/2 server handles all PWA logic
    location /smartphone/crm {
        # Proxy to Node.js backend
        proxy_pass http://nodejs_backend;
        
        # ═══════════════════════════════════════════════════════════════════════
        # Upstream Protocol — HTTP/2 cleartext (h2c) to Node.js
        # IMPORTANT: Requires nginx 1.25.1+ for proxy_http_version 2.0.
        # The Node.js server.js runs HTTP/2 only (allowHTTP1: false).
        # Using HTTP/1.1 here causes protocol mismatch → broken streams.
        # ═══════════════════════════════════════════════════════════════════════
        proxy_http_version 2.0;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Indicate HTTP/2 to backend
        proxy_set_header X-Http-Version $server_protocol;
        
        # ═══════════════════════════════════════════════════════════════════════
        # Buffering Configuration
        # ═══════════════════════════════════════════════════════════════════════
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
        
        # ═══════════════════════════════════════════════════════════════════════
        # Timeouts
        # ═══════════════════════════════════════════════════════════════════════
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # ═══════════════════════════════════════════════════════════════════════
        # Cache Control (let Node.js handle caching)
        # ═══════════════════════════════════════════════════════════════════════
        proxy_cache off;
        
        # ═══════════════════════════════════════════════════════════════════════
        # Keep-Alive
        # ═══════════════════════════════════════════════════════════════════════
        proxy_socket_keepalive on;
        
        # Pass through original request
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
        
        # Error handling
        proxy_intercept_errors off;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
    }
    
    # ═══════════════════════════════════════════════════════════════════════════
    # SECTION 2: Stream Proxy (handled by Node.js)
    # ═══════════════════════════════════════════════════════════════════════════
    # Note: /smartphone/crm/stream/* is already handled by the location above
    # The Node.js server will handle stream proxying internally
    
    # ═══════════════════════════════════════════════════════════════════════════
    # Health Check Endpoint
    # ═══════════════════════════════════════════════════════════════════════════
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    # ═══════════════════════════════════════════════════════════════════════════
    # HTTP/2 Server Push (Performance Optimization)
    # ═══════════════════════════════════════════════════════════════════════════
    location = /smartphone/crm/index.html {
        proxy_pass http://nodejs_backend;
        proxy_http_version 2.0;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        
        # HTTP/2 Server Push for critical resources
        # Uncomment after identifying critical assets
        # http2_push /smartphone/crm/assets/main.js;
        # http2_push /smartphone/crm/assets/main.css;
    }
}
